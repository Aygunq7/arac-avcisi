<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cache temizleniyor</title><style>body{font-family:system-ui;background:#07111f;color:#eaf3ff;display:grid;place-items:center;min-height:100vh;padding:24px}div{max-width:560px;background:#111c2d;border:1px solid #26364d;border-radius:22px;padding:28px}a{color:#7dd3fc}</style></head><body><div><h1>Eski mobil önbellek temizleniyor…</h1><p>Birkaç saniye içinde yeni uygulama açılacak.</p><p><a href="/?v=21">Hemen aç</a></p></div><script>
(async()=>{try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();for(const r of regs){await r.unregister();}} if(window.caches){const keys=await caches.keys();for(const k of keys){await caches.delete(k);}} localStorage.clear(); sessionStorage.clear();}catch(e){} setTimeout(()=>location.href='/?v=21&t='+Date.now(),1000);})();
</script></body></html>
